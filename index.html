<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oddziały – Remix Szkolenia</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; }

    .rs-section {
      font-family: 'DM Sans', sans-serif;
      background: #0D0D0D;
      color: #E8E8E8;
      padding: 60px 40px 80px;
      width: 100%;
    }

    .rs-heading {
      text-align: center;
      margin-bottom: 40px;
    }
    .rs-heading h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      letter-spacing: 2px;
      color: #fff;
      line-height: 1;
    }
    .rs-heading h2 span { color: #D4600A; }
    .rs-heading p {
      margin-top: 12px;
      color: #888;
      font-size: 0.95rem;
    }

    .rs-map-wrap {
      width: 100%;
      height: 520px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(212,96,10,0.25);
      margin-bottom: 48px;
    }
    #rs-map { width: 100%; height: 100%; }

    .leaflet-popup-content-wrapper {
      border-radius: 10px !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35) !important;
      padding: 0 !important;
      overflow: hidden;
    }
    .leaflet-popup-content { margin: 0 !important; }

    .rs-cards-header { margin-bottom: 20px; }
    .rs-cards-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 2px;
      color: #fff;
    }
    .rs-cards-title span { color: #D4600A; }

    .rs-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }

    .rs-card {
      background: #1A1A1A;
      border: 1px solid rgba(212,96,10,0.2);
      border-radius: 12px;
      padding: 18px 20px 42px;
      text-decoration: none;
      display: block;
      position: relative;
      overflow: hidden;
      transition: border-color .2s, transform .2s;
    }
    .rs-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: #D4600A;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .25s;
    }
    .rs-card:hover { border-color: #D4600A; transform: translateY(-3px); }
    .rs-card:hover::before { transform: scaleX(1); }

    .rs-card-city {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.25rem;
      letter-spacing: 1px;
      color: #fff;
      margin-bottom: 4px;
    }
    .rs-card-venue { font-size: 0.75rem; color: #D4600A; font-weight: 500; margin-bottom: 6px; }
    .rs-card-address { font-size: 0.78rem; color: #888; line-height: 1.5; }
    .rs-card-arrow {
      position: absolute;
      bottom: 14px; right: 14px;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: rgba(212,96,10,0.12);
      display: grid; place-items: center;
      transition: background .2s;
    }
    .rs-card:hover .rs-card-arrow { background: #D4600A; }
    .rs-card-arrow svg { width: 12px; height: 12px; stroke: #D4600A; fill: none; stroke-width: 2.5; }
    .rs-card:hover .rs-card-arrow svg { stroke: #fff; }


    .rs-stats {
      display: inline-flex;
      align-items: center;
      gap: 0;
      margin-top: 24px;
      background: #1a1a1a;
      border: 1px solid rgba(212,96,10,0.25);
      border-radius: 14px;
      padding: 16px 32px;
      gap: 32px;
    }
    .rs-stat { display: flex; flex-direction: column; align-items: center; }
    .rs-stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      color: #D4600A;
      line-height: 1;
    }
    .rs-stat-label { font-size: 0.72rem; color: #888; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.8px; }
    .rs-stat-sep { width: 1px; height: 36px; background: rgba(212,96,10,0.25); }

    @media (max-width: 700px) {
      .rs-section { padding: 40px 20px 60px; }
      .rs-map-wrap { height: 360px; }
    }
  </style>
</head>

function makeIcon() {
  const html = `<div style="
    width:52px;height:52px;
    background:white;
    border-radius:50%;
    border:3px solid #D4600A;
    box-shadow:0 3px 10px rgba(0,0,0,0.45);
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    padding:3px;
  ">
    <img src="${LOGO_URL}" style="width:100%;height:100%;object-fit:contain;border-radius:50%"/>
  </div>`;
  return L.divIcon({ html, className:'', iconSize:[52,52], iconAnchor:[26,26], popupAnchor:[0,-30] });
}

const icon = makeIcon();

locations.forEach(loc => {
  L.marker([loc.lat, loc.lng], { icon }).addTo(map).bindPopup(
    `<div style="font-family:'DM Sans',sans-serif;padding:14px 16px;min-width:185px">
      <div style="font-size:1rem;font-weight:700;color:#D4600A;margin-bottom:3px">${loc.city}</div>
      <div style="font-size:0.8rem;color:#444;margin-bottom:2px">${loc.venue}</div>
      <div style="font-size:0.74rem;color:#777;margin-bottom:10px;line-height:1.4">${loc.address}</div>
      <a href="${loc.url}" target="_blank"
        style="display:inline-block;background:#D4600A;color:#fff;font-size:0.78rem;font-weight:700;
               text-decoration:none;padding:6px 14px;border-radius:6px">
        Zobacz kurs →
      </a>
    </div>`
  );
});

// ── CARDS ──
const grid = document.getElementById('rsCardsGrid');
locations.forEach(loc => {
  const a = document.createElement('a');
  a.className = 'rs-card';
  a.href = loc.url;
  a.target = '_blank';
  a.innerHTML = `
    <div class="rs-card-city">${loc.city}</div>
    <div class="rs-card-venue">${loc.venue}</div>
    <div class="rs-card-address">${loc.address}</div>
    <div class="rs-card-arrow">
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </div>`;
  grid.appendChild(a);
});
</script>
